<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – College Management System</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen p-4">

    <div id="toast" class="hidden"></div>

    <div class="glass-card w-full max-w-md p-8 shadow-2xl">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Forgot Password</h1>
            <p class="text-gray-400 text-sm mt-1" id="stepLabel">Step 1 of 3 — Enter your email</p>
        </div>

        <!-- Step Indicators -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div id="dot1" class="w-3 h-3 rounded-full bg-indigo-500 transition-all"></div>
            <div id="dot2" class="w-3 h-3 rounded-full bg-white/20 transition-all"></div>
            <div id="dot3" class="w-3 h-3 rounded-full bg-white/20 transition-all"></div>
        </div>

        <!-- STEP 1: Enter contact -->
        <div id="step1">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                    <input type="text" id="contact" placeholder="you@college.edu"
                        class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                               rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                </div>
                <button id="sendOtpBtn"
                    class="btn-gradient w-full text-white font-semibold py-3 rounded-xl text-sm shadow-lg">
                    Send OTP
                </button>
            </div>
        </div>

        <!-- STEP 2: Enter OTP (hidden) -->
        <div id="step2" class="hidden">
            <div class="space-y-4">
                <div class="text-center mb-2">
                    <p class="text-gray-300 text-sm">OTP sent to</p>
                    <p class="text-indigo-400 font-medium text-sm" id="contactDisplay"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Enter OTP</label>
                    <input type="text" id="otpInput" placeholder="123456" maxlength="6"
                        class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                               rounded-xl px-4 py-3 text-sm text-center text-2xl tracking-widest
                               focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                </div>
                <div class="flex gap-2">
                    <button id="backToStep1Btn"
                        class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl text-sm transition-colors">
                        Back
                    </button>
                    <button id="verifyOtpBtn"
                        class="flex-1 btn-gradient text-white font-semibold py-3 rounded-xl text-sm shadow-lg">
                        Verify OTP
                    </button>
                </div>
                <button id="resendOtpBtn" class="w-full text-indigo-400 hover:text-indigo-300 text-sm transition-colors">
                    Resend OTP
                </button>
            </div>
        </div>

        <!-- STEP 3: New password (hidden) -->
        <div id="step3" class="hidden">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">New Password</label>
                    <div class="relative">
                        <input type="password" id="newPassword" placeholder="Min. 6 characters"
                            class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                                   rounded-xl px-4 py-3 text-sm pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                        <button type="button" id="togglePwd1"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-800 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" placeholder="Re-enter password"
                            class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                                   rounded-xl px-4 py-3 text-sm pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                        <button type="button" id="togglePwd2"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-800 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button id="resetBtn"
                    class="btn-gradient w-full text-white font-semibold py-3 rounded-xl text-sm shadow-lg">
                    Reset Password
                </button>
            </div>
        </div>

        <!-- Back to login -->
        <p class="text-center text-gray-400 text-sm mt-6">
            Remember your password?
            <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Sign In</a>
        </p>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/config.js"></script>
    <script>
        let contactVal = '';
        let resetToken = '';

        // ── Helpers ──────────────────────────────────────────────────────────
        function setStep(n) {
            document.getElementById('step1').classList.toggle('hidden', n !== 1);
            document.getElementById('step2').classList.toggle('hidden', n !== 2);
            document.getElementById('step3').classList.toggle('hidden', n !== 3);

            const labels = ['Step 1 of 3 — Enter your email', 'Step 2 of 3 — Enter OTP', 'Step 3 of 3 — Set new password'];
            document.getElementById('stepLabel').textContent = labels[n - 1];

            [1, 2, 3].forEach(i => {
                document.getElementById(`dot${i}`).className =
                    `w-3 h-3 rounded-full transition-all ${i <= n ? 'bg-indigo-500' : 'bg-white/20'}`;
            });
        }

        function setLoading(btn, loading, text) {
            btn.disabled = loading;
            btn.innerHTML = loading ? '<span class="loader"></span>' : text;
        }

        // ── Toggle password visibility ────────────────────────────────────────
        document.getElementById('togglePwd1').addEventListener('click', () => {
            const inp = document.getElementById('newPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });
        document.getElementById('togglePwd2').addEventListener('click', () => {
            const inp = document.getElementById('confirmPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });

        // ── Step 1: Send OTP ──────────────────────────────────────────────────
        document.getElementById('sendOtpBtn').addEventListener('click', async () => {
            const contact = document.getElementById('contact').value.trim();
            if (!contact) { showToast('Please enter your email', 'error'); return; }

            const btn = document.getElementById('sendOtpBtn');
            setLoading(btn, true);

            try {
                const res = await fetch(API_BASE_URL + '/api/auth/forgot-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact }),
                });
                const data = await res.json();

                if (data.success) {
                    contactVal = contact;
                    document.getElementById('contactDisplay').textContent = contact;
                    showToast('OTP sent! Check your email or server console.', 'success');
                    setStep(2);
                    setTimeout(() => document.getElementById('otpInput').focus(), 100);
                } else {
                    showToast(data.message || 'Failed to send OTP', 'error');
                }
            } catch (e) {
                showToast('Server error. Please try again.', 'error');
            } finally {
                setLoading(btn, false, 'Send OTP');
            }
        });

        // ── Step 2: Verify OTP ────────────────────────────────────────────────
        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp || otp.length !== 6) { showToast('Enter the 6-digit OTP', 'error'); return; }

            const btn = document.getElementById('verifyOtpBtn');
            setLoading(btn, true);

            try {
                const res = await fetch(API_BASE_URL + '/api/auth/forgot-password/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: contactVal, otp }),
                });
                const data = await res.json();

                if (data.success) {
                    resetToken = data.resetToken;
                    showToast('OTP verified!', 'success');
                    setStep(3);
                    setTimeout(() => document.getElementById('newPassword').focus(), 100);
                } else {
                    showToast(data.message || 'Invalid OTP', 'error');
                }
            } catch (e) {
                showToast('Server error. Please try again.', 'error');
            } finally {
                setLoading(btn, false, 'Verify OTP');
            }
        });

        // ── Step 2: Resend OTP ────────────────────────────────────────────────
        document.getElementById('resendOtpBtn').addEventListener('click', async () => {
            const btn = document.getElementById('resendOtpBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE_URL + '/api/auth/forgot-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: contactVal }),
                });
                const data = await res.json();
                showToast(data.success ? 'OTP resent!' : (data.message || 'Failed'), data.success ? 'success' : 'error');
            } catch (e) {
                showToast('Server error.', 'error');
            } finally {
                btn.textContent = 'Resend OTP';
                btn.disabled = false;
            }
        });

        // ── Step 2: Back ──────────────────────────────────────────────────────
        document.getElementById('backToStep1Btn').addEventListener('click', () => setStep(1));

        // ── Step 3: Reset Password ────────────────────────────────────────────
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || newPassword.length < 6) {
                showToast('Password must be at least 6 characters', 'error'); return;
            }
            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error'); return;
            }

            const btn = document.getElementById('resetBtn');
            setLoading(btn, true);

            try {
                const res = await fetch(API_BASE_URL + '/api/auth/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: contactVal, resetToken, newPassword }),
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showToast(data.message || 'Reset failed', 'error');
                    setLoading(btn, false, 'Reset Password');
                }
            } catch (e) {
                showToast('Server error. Please try again.', 'error');
                setLoading(btn, false, 'Reset Password');
            }
        });

        // Enter key support
        document.getElementById('contact').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('sendOtpBtn').click();
        });
        document.getElementById('otpInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('verifyOtpBtn').click();
        });
        document.getElementById('confirmPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('resetBtn').click();
        });
    </script>
</body>
</html>
