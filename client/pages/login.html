<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – College Management System</title>
  <meta name="description"
    content="Login to the College Management System. Access your student, teacher, or admin dashboard." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="login-page gradient-bg flex items-center justify-center min-h-screen p-4">

  <!-- Login Loading Overlay -->
  <div id="loginOverlay" class="login-overlay" style="display:none;">
    <div class="loader"></div>
    <span>Signing you in...</span>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden"></div>

  <div id="loginCard" class="glass-card w-full max-w-md p-8 shadow-2xl">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
      <p class="text-gray-400 text-sm mt-1">College Management System</p>
    </div>

    <!-- Login Type Tabs -->
    <div class="flex p-1 mb-6 bg-white/5 rounded-xl border border-white/10">
      <button id="tabStudent"
        class="flex-1 py-2 text-sm font-semibold rounded-lg bg-indigo-600 text-white transition-all shadow-md">
        Student Login
      </button>
      <button id="tabStaff"
        class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400 hover:text-white transition-all">
        Staff Login
      </button>
    </div>

    <!-- Student Login Form (Active by default) -->
    <form id="studentLoginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Invite Code</label>
        <input type="text" id="inviteCode" placeholder="e.g. STU-1A2B3C" class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
               rounded-xl px-4 py-3 text-sm transition-all uppercase focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" id="studentPassword" placeholder="••••••••" class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                 rounded-xl px-4 py-3 text-sm transition-all pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required />
          <button type="button"
            class="togglePwd absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-800 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="studentBtn"
        class="btn-gradient w-full text-white font-semibold py-3 rounded-xl text-sm shadow-lg mt-2">
        Enter Student Portal
      </button>
    </form>

    <!-- Staff Login Form (Hidden by default) -->
    <form id="staffLoginForm" class="space-y-4 hidden">
      <!-- Sub-tabs: Teacher / Admin -->
      <div class="flex gap-2 bg-white/5 rounded-xl p-1">
        <button type="button" id="staffTabTeacher"
          class="flex-1 py-2 text-xs font-semibold rounded-lg bg-emerald-600 text-white transition-all"
          onclick="switchStaffTab('teacher')">
          👩‍🏫 Teacher (Code)
        </button>
        <button type="button" id="staffTabAdmin"
          class="flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400 hover:text-white transition-all"
          onclick="switchStaffTab('admin')">
          🛡️ Admin (Email)
        </button>
      </div>

      <div id="staffStep1" class="space-y-4">
        <!-- Teacher Code login -->
        <div id="teacherCodeLogin" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Teacher Code</label>
            <input type="text" id="teacherCode" placeholder="e.g. TCH-1A2B3C"
              class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black rounded-xl px-4 py-3 text-sm uppercase focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <div class="relative">
              <input type="password" id="teacherCodePwd" placeholder="••••••••"
                class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black rounded-xl px-4 py-3 text-sm pr-12 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent" />
              <button type="button" class="togglePwd absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-800 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18" /></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Admin email login (hidden by default) -->
        <div id="adminEmailLogin" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
            <input type="email" id="email" placeholder="admin@college.edu"
              class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <div class="relative">
              <input type="password" id="staffPassword" placeholder="••••••••"
                class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black rounded-xl px-4 py-3 text-sm pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
              <button type="button" class="togglePwd absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-800 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18" /></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="button" id="staffNextBtn"
          class="bg-emerald-700 hover:bg-emerald-600 w-full text-white font-semibold py-3 rounded-xl text-sm shadow mt-2 transition-colors">
          Continue
        </button>
      </div>

      <!-- Staff OTP Step -->
      <div id="staffStep2" class="space-y-4 hidden">
        <div class="text-center mb-4">
          <p class="text-gray-300 text-sm">Enter OTP sent to your email</p>
          <p class="text-indigo-400 font-medium text-xs mt-1" id="staffOtpHint"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">OTP Code</label>
          <input type="text" id="staffOtpCode" placeholder="123456" maxlength="6" 
            class="input-glow w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
            rounded-xl px-4 py-3 text-sm transition-all text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent" required />
        </div>

        <div class="flex gap-2">
          <button type="button" id="staffBackBtn"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl text-sm transition-colors">
            Back
          </button>
          <button type="submit" id="staffBtn"
            class="flex-1 bg-emerald-700 hover:bg-emerald-600 text-white font-semibold py-3 rounded-xl text-sm shadow transition-colors">
            Verify & Login
          </button>
        </div>

        <button type="button" id="staffResendOtp" class="w-full text-indigo-400 hover:text-indigo-300 text-sm transition-colors">
          Resend OTP
        </button>
      </div>
    </form>

    <!-- Register link -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account?
      <a href="register.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Register</a>
    </p>

    <!-- Forgot Password link -->
    <p class="text-center mt-2">
      <a href="forgot-password.html" class="text-sm text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Forgot Password?</a>
    </p>

    <!-- Demo credentials hint -->
    <div class="mt-6 p-3 rounded-xl bg-white/5 border border-white/10">
      <p class="text-xs text-gray-400 text-center">
        🎓 Students: Use <strong>Invite Code</strong> given by admin.<br>
        👩‍🏫 Teachers: Use <strong>Teacher Code</strong> (TCH-XXXXX) given by admin.
      </p>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // Auto-redirect if already logged in
    (function () {
      try {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (token && user && user.role) {
          const role = String(user.role).toLowerCase().trim();
          if (role === 'admin') { window.location.replace('admin.html'); return; }
          if (role === 'teacher') { window.location.replace('teacher.html'); return; }
          window.location.replace('student.html'); return;
        }
      } catch (e) { /* ignore parse errors, show login */ }
    })();

    // Tab Switching Logic
    const tabStudent = document.getElementById('tabStudent');
    const tabStaff = document.getElementById('tabStaff');
    const studentLoginForm = document.getElementById('studentLoginForm');
    const staffLoginForm = document.getElementById('staffLoginForm');

    tabStudent.addEventListener('click', () => {
      tabStudent.className = 'flex-1 py-2 text-sm font-semibold rounded-lg bg-indigo-600 text-white transition-all shadow-md';
      tabStaff.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400 hover:text-white transition-all';
      studentLoginForm.classList.remove('hidden');
      staffLoginForm.classList.add('hidden');
    });

    tabStaff.addEventListener('click', () => {
      tabStaff.className = 'flex-1 py-2 text-sm font-semibold rounded-lg bg-gray-700 text-white transition-all shadow-md';
      tabStudent.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400 hover:text-white transition-all';
      staffLoginForm.classList.remove('hidden');
      studentLoginForm.classList.add('hidden');
    });

    // Toggle password visibility for all fields
    document.querySelectorAll('.togglePwd').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const input = e.currentTarget.previousElementSibling;
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    // Auto-focus first visible input
    document.getElementById('inviteCode').focus();

    const loginCard = document.getElementById('loginCard');
    const loginOverlay = document.getElementById('loginOverlay');

    function shakeCard() {
      loginCard.classList.add('shake');
      setTimeout(() => loginCard.classList.remove('shake'), 600);
    }

    // Staff login mode tracker
    let staffLoginMode = 'teacher'; // 'teacher' or 'admin'

    function switchStaffTab(mode) {
      staffLoginMode = mode;
      if (mode === 'teacher') {
        document.getElementById('staffTabTeacher').className = 'flex-1 py-2 text-xs font-semibold rounded-lg bg-emerald-600 text-white transition-all';
        document.getElementById('staffTabAdmin').className = 'flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400 hover:text-white transition-all';
        document.getElementById('teacherCodeLogin').classList.remove('hidden');
        document.getElementById('adminEmailLogin').classList.add('hidden');
        document.getElementById('staffNextBtn').textContent = 'Continue';
        document.getElementById('staffNextBtn').className = 'bg-emerald-700 hover:bg-emerald-600 w-full text-white font-semibold py-3 rounded-xl text-sm shadow mt-2 transition-colors';
      } else {
        document.getElementById('staffTabAdmin').className = 'flex-1 py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white transition-all';
        document.getElementById('staffTabTeacher').className = 'flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400 hover:text-white transition-all';
        document.getElementById('adminEmailLogin').classList.remove('hidden');
        document.getElementById('teacherCodeLogin').classList.add('hidden');
        document.getElementById('staffNextBtn').textContent = 'Continue';
        document.getElementById('staffNextBtn').className = 'bg-indigo-600 hover:bg-indigo-500 w-full text-white font-semibold py-3 rounded-xl text-sm shadow mt-2 transition-colors';
      }
    }
  </script>
  <script src="login-scripts.js"></script>
</body>

</html>
