<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Setup – College Management System</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen p-4">

    <div id="toast" class="hidden"></div>

    <div class="glass-card w-full max-w-md p-8 shadow-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-orange-600 mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Admin Setup</h1>
            <p class="text-gray-400 text-sm mt-1">Create the administrator account</p>
        </div>

        <!-- Info banner -->
        <div class="mb-6 p-3 rounded-xl flex items-start gap-3" style="background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);">
            <svg class="w-4 h-4 text-orange-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-xs text-orange-300">This page is for the <strong>first-time admin setup only</strong>. Teachers are added by the admin from the admin panel.</p>
        </div>

        <!-- Step 1: Details -->
        <form id="registerForm" class="space-y-4">
            <div id="step1" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Full Name</label>
                    <input type="text" id="name" placeholder="Admin Name"
                        class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                               rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" required />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                    <input type="email" id="email" placeholder="admin@school.edu"
                        class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                               rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" required />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Min 8 chars, uppercase, number, symbol"
                            class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                                   rounded-xl px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" required />
                        <button type="button" id="togglePwd"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-800 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-10.94 3.06A9 9 0 0119.94 15.06M3 3l18 18"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="mt-2 space-y-1" id="pwdRules">
                        <p class="text-xs" id="rule-len">  ✗ At least 8 characters</p>
                        <p class="text-xs" id="rule-upper">✗ One uppercase letter</p>
                        <p class="text-xs" id="rule-num">  ✗ One number</p>
                        <p class="text-xs" id="rule-sym">  ✗ One special character (!@#$%^&*)</p>
                    </div>
                </div>

                <button type="button" id="sendOtpBtn"
                    class="w-full text-white font-semibold py-3 rounded-xl text-sm shadow-lg mt-2 transition-all"
                    style="background:linear-gradient(135deg,#f97316,#ea580c);">
                    Send Verification OTP
                </button>
            </div>

            <!-- Step 2: OTP -->
            <div id="step2" class="space-y-4 hidden">
                <div class="text-center mb-2">
                    <p class="text-gray-300 text-sm">OTP sent to</p>
                    <p class="text-orange-400 font-medium" id="otpSentTo"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">OTP Code</label>
                    <input type="text" id="otpCode" placeholder="123456" maxlength="6"
                        class="w-full bg-white border border-gray-300 text-gray-800 placeholder-gray-400 caret-black
                               rounded-xl px-4 py-3 text-sm text-center text-2xl tracking-widest
                               focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" />
                </div>

                <div class="flex gap-2">
                    <button type="button" id="backBtn"
                        class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl text-sm transition-colors">
                        Back
                    </button>
                    <button type="submit" id="registerBtn"
                        class="flex-1 text-white font-semibold py-3 rounded-xl text-sm shadow-lg transition-all"
                        style="background:linear-gradient(135deg,#f97316,#ea580c);">
                        Create Admin Account
                    </button>
                </div>

                <button type="button" id="resendOtpBtn"
                    class="w-full text-orange-400 hover:text-orange-300 text-sm transition-colors">
                    Resend OTP
                </button>
            </div>
        </form>

        <p class="text-center text-gray-400 text-sm mt-6">
            Already have an account?
            <a href="login.html" class="text-orange-400 hover:text-orange-300 font-medium transition-colors">Sign In</a>
        </p>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let otpSent = false;

        // Password toggle
        document.getElementById('togglePwd').addEventListener('click', () => {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });

        // Live password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const v = this.value;
            const set = (id, ok) => {
                const el = document.getElementById(id);
                el.textContent = (ok ? '✓' : '✗') + el.textContent.slice(1);
                el.style.color = ok ? '#4ade80' : '#9ca3af';
            };
            set('rule-len',   v.length >= 8);
            set('rule-upper', /[A-Z]/.test(v));
            set('rule-num',   /[0-9]/.test(v));
            set('rule-sym',   /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(v));
        });

        function validatePassword(pwd) {
            return pwd.length >= 8 && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) &&
                   /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(pwd);
        }

        // Send OTP
        document.getElementById('sendOtpBtn').addEventListener('click', async () => {
            const name     = document.getElementById('name').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                showToast('Please fill all fields', 'error'); return;
            }
            if (!validatePassword(password)) {
                showToast('Password does not meet requirements', 'error'); return;
            }

            const btn = document.getElementById('sendOtpBtn');
            btn.innerHTML = '<span class="loader"></span>';
            btn.disabled = true;

            try {
                const res = await fetch('/api/otp/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: email }),
                });
                const data = await res.json();

                if (data.success) {
                    otpSent = true;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('otpSentTo').textContent = email;
                    showToast('OTP sent! Check your email or server console.', 'success');
                    document.getElementById('otpCode').focus();
                } else {
                    showToast(data.message || 'Failed to send OTP', 'error');
                    btn.innerHTML = 'Send Verification OTP';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Server error. Please try again.', 'error');
                btn.innerHTML = 'Send Verification OTP';
                btn.disabled = false;
            }
        });

        // Back
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('sendOtpBtn').innerHTML = 'Send Verification OTP';
            document.getElementById('sendOtpBtn').disabled = false;
        });

        // Resend OTP
        document.getElementById('resendOtpBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('resendOtpBtn');
            btn.textContent = 'Sending...'; btn.disabled = true;
            try {
                const res = await fetch('/api/otp/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: email }),
                });
                const data = await res.json();
                showToast(data.success ? 'OTP resent!' : (data.message || 'Failed'), data.success ? 'success' : 'error');
            } catch { showToast('Server error.', 'error'); }
            finally { btn.textContent = 'Resend OTP'; btn.disabled = false; }
        });

        // Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!otpSent) { showToast('Please send OTP first', 'error'); return; }

            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '<span class="loader"></span>';
            btn.disabled = true;

            const email   = document.getElementById('email').value.trim();
            const otpCode = document.getElementById('otpCode').value.trim();

            try {
                // Verify OTP first
                const otpRes = await fetch('/api/otp/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact: email, otp: otpCode }),
                });
                const otpData = await otpRes.json();

                if (!otpData.success) {
                    showToast(otpData.message || 'Invalid OTP', 'error');
                    btn.innerHTML = 'Create Admin Account';
                    btn.disabled = false;
                    return;
                }

                // Register admin
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name:     document.getElementById('name').value.trim(),
                        email,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    showToast('Admin account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'admin.html', 800);
                } else {
                    showToast(data.message || 'Registration failed', 'error');
                    btn.innerHTML = 'Create Admin Account';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Server error. Please try again.', 'error');
                btn.innerHTML = 'Create Admin Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
